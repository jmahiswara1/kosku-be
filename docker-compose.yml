version: "3.9"

services:
  # ─── Local PostgreSQL ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: kosku_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kosku}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kosku_secret}
      POSTGRES_DB: ${POSTGRES_DB:-kosku_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kosku} -d ${POSTGRES_DB:-kosku_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── KosKu API ───────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kosku_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: development
      PORT: 8080
      DATABASE_URL: postgres://${POSTGRES_USER:-kosku}:${POSTGRES_PASSWORD:-kosku_secret}@postgres:5432/${POSTGRES_DB:-kosku_dev}?sslmode=disable
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      SENTRY_DSN: ${SENTRY_DSN}
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    working_dir: /app

volumes:
  postgres_data:
