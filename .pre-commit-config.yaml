repos:
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
      - id: go-mod-tidy
      - id: go-unit-tests
        args: [-race, ./...]
      - id: go-build
        args: [./...]

  - repo: local
    hooks:
      - id: go-vet
        name: Go Vet
        entry: go vet ./...
        language: system
        pass_filenames: false
        types: [go]
        stages: [pre-commit]

      - id: lint
        name: Lint Code
        entry: make lint
        language: system
        pass_filenames: false
        types: [go]
        stages: [pre-commit]

      - id: swagger
        name: Generate Swagger Docs
        entry: make swagger
        language: system
        pass_filenames: false
        types: [go]
        stages: [pre-commit]
