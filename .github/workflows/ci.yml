name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kosku_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kosku_test?sslmode=disable
      JWT_SECRET: test-jwt-secret-for-ci
      SUPABASE_URL: https://placeholder.supabase.co
      SUPABASE_JWT_SECRET: test-jwt-secret-for-ci
      SUPABASE_SERVICE_KEY: test-service-key
      RESEND_API_KEY: re_test_placeholder
      ALLOWED_ORIGINS: http://localhost:3000
      PORT: 8080
      GIN_MODE: test
      LOG_LEVEL: error
      LOG_PRETTY: "false"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

      - name: Run tests
        run: go test ./...

      - name: Build binary
        run: go build ./cmd/api

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: kosku-backend:ci

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service kosku-backend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
