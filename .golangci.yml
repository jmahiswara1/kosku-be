version: "2"

run:
  timeout: 5m
  tests: true

formatters:
  enable:
    - gofmt           # Enforce gofmt formatting
    - goimports       # Enforce goimports ordering

linters:
  default: none
  enable:
    # Correctness
    - errcheck        # Check for unchecked errors
    - govet           # Report suspicious constructs
    - ineffassign     # Detect ineffectual assignments
    - staticcheck     # Static analysis checks (includes gosimple)
    - unused          # Check for unused code

    # Style & Formatting
    - misspell        # Spell checker for comments and strings
    - whitespace      # Detect leading/trailing whitespace

    # Security
    - gosec           # Security checks (G-series rules)

    # Complexity & Maintainability
    - cyclop          # Cyclomatic complexity
    - funlen          # Function length
    - gocognit        # Cognitive complexity
    - nestif          # Deeply nested if statements

    # Best Practices
    - bodyclose       # Ensure HTTP response bodies are closed
    - contextcheck    # Check context usage
    - durationcheck   # Check for incorrect duration multiplications
    - exhaustive      # Check exhaustiveness of enum switches
    - noctx           # Detect HTTP requests without context
    - nolintlint      # Ensure nolint directives are valid
    - prealloc        # Suggest slice pre-allocation
    - predeclared     # Check for shadowing of predeclared identifiers
    - revive          # General-purpose linter (replacement for golint)
    - rowserrcheck    # Check sql.Rows.Err() is checked
    - sqlclosecheck   # Check sql.Rows and sql.Stmt are closed
    - tparallel       # Detect missing t.Parallel() in tests
    - unconvert       # Remove unnecessary type conversions
    - unparam         # Report unused function parameters
    - wastedassign    # Find wasted assignments

  settings:
    cyclop:
      max-complexity: 25

    funlen:
      lines: 120
      statements: 80

    gocognit:
      min-complexity: 55

    gosec:
      excludes:
        - G104  # Errors unhandled (covered by errcheck)

    revive:
      rules:
        - name: exported
          arguments:
            - "checkPrivateReceivers"
            - "sayRepetitiveInsteadOfStutters"

    misspell:
      locale: US

  exclusions:
    rules:
      # Relax complexity rules in test files
      - path: "_test\\.go"
        linters:
          - funlen
          - cyclop
          - gocognit
          - nestif
          - unparam

      # Allow long lines in generated files
      - path: "internal/repository/"
        linters:
          - funlen
          - cyclop
          - gocognit
          - nestif

      # Allow init functions in main
      - path: "cmd/api/main\\.go"
        linters:
          - funlen
          - cyclop

      # Allow complexity in service layer (business logic is inherently complex)
      - path: "internal/service/"
        linters:
          - cyclop
          - gocognit
          - nestif
          - funlen

      # Allow complexity in handler layer
      - path: "internal/handler/"
        linters:
          - cyclop
          - gocognit
          - nestif
          - funlen

      # Allow complexity in middleware
      - path: "internal/middleware/"
        linters:
          - cyclop
          - gocognit
          - nestif

      # Relax noctx in test files — httptest.NewRequest is acceptable in tests
      - path: "_test\\.go"
        linters:
          - noctx

      # Relax gosec G101 (hardcoded credentials) in test files — test fixtures use fake values
      - path: "_test\\.go"
        linters:
          - gosec

      # Relax gosec G115 (integer overflow) in test files — bounded test values
      - path: "_test\\.go"
        linters:
          - gosec
